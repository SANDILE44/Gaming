<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<style>


body { margin:0; overflow:hidden; background:black; }

/* Controls */
.controls {
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
}

.dpad {
  display:grid;
  grid-template-columns:60px 60px 60px;
  grid-template-rows:60px 60px 60px;
  gap:5px;
}

.btn {
  background:rgba(255,255,255,0.2);
  border:none;
  color:white;
  font-size:20px;
  border-radius:10px;
}

.attack {
  width:80px;
  height:80px;
  font-size:18px;
  background:rgba(255,0,0,0.5);
}
</style>
</head>

<body>

<div class="controls">
  <!-- D-Pad -->
  <div class="dpad">
    <div></div>
    <button class="btn" ontouchstart="keys.up=true" ontouchend="keys.up=false">⬆️</button>
    <div></div>

    <button class="btn" ontouchstart="keys.left=true" ontouchend="keys.left=false">⬅️</button>
    <div></div>
    <button class="btn" ontouchstart="keys.right=true" ontouchend="keys.right=false">➡️</button>

    <div></div>
    <button class="btn" ontouchstart="keys.down=true" ontouchend="keys.down=false">⬇️</button>
    <div></div>
  </div>

  <!-- Attack -->
  <button class="btn attack" ontouchstart="attack()">👊</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Create ninja group
const ninja = new THREE.Group();

// Body
const body = new THREE.Mesh(
  new THREE.BoxGeometry(1, 1.5, 0.5),
  new THREE.MeshBasicMaterial({ color: 0x111111 })
);
ninja.add(body);

// Head
const head = new THREE.Mesh(
  new THREE.BoxGeometry(0.7, 0.7, 0.7),
  new THREE.MeshBasicMaterial({ color: 0x000000 })
);
head.position.y = 1.2;
ninja.add(head);

// Left Arm
const leftArm = new THREE.Mesh(
  new THREE.BoxGeometry(0.3, 1, 0.3),
  new THREE.MeshBasicMaterial({ color: 0x111111 })
);
leftArm.position.x = -0.8;
ninja.add(leftArm);

// Right Arm
const rightArm = new THREE.Mesh(
  new THREE.BoxGeometry(0.3, 1, 0.3),
  new THREE.MeshBasicMaterial({ color: 0x111111 })
);
rightArm.position.x = 0.8;
ninja.add(rightArm);

// Legs
const leg1 = new THREE.Mesh(
  new THREE.BoxGeometry(0.4, 1, 0.4),
  new THREE.MeshBasicMaterial({ color: 0x111111 })
);
leg1.position.set(-0.3, -1, 0);
ninja.add(leg1);

const leg2 = leg1.clone();
leg2.position.x = 0.3;
ninja.add(leg2);

scene.add(ninja);

// Enemy
const enemy = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshBasicMaterial({ color: 0xff3333 })
);
enemy.position.x = 2;
scene.add(enemy);

camera.position.z = 5;

// Controls
let keys = { up:false, down:false, left:false, right:false };
let isAttacking = false;
let enemyHealth = 5;

function attack() {
  isAttacking = true;
  setTimeout(() => isAttacking = false, 200);
}

// Loop
function animate() {
  requestAnimationFrame(animate);

  // Movement
  if (keys.left) ninja.position.x -= 0.06;
  if (keys.right) ninja.position.x += 0.06;
  if (keys.up) ninja.position.y += 0.06;
  if (keys.down) ninja.position.y -= 0.06;

  // Attack animation
  ninja.scale.x = isAttacking ? 1.5 : 1;

  // Hit detection
  const distance = ninja.position.distanceTo(enemy.position);

  if (isAttacking && distance < 1.5 && enemyHealth > 0) {
    enemyHealth--;
    enemy.position.x += 0.3;
    isAttacking = false;
  }

  if (enemyHealth <= 0) {
    scene.remove(enemy);
  }

  renderer.render(scene, camera);
}

animate();

// Fix resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
