<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden;">

<div class="character">

  <div class="head">
    <div class="eye left"></div>
    <div class="eye right"></div>
  </div>

  <div class="body"></div>

  <div class="arms">
    <div class="arm left"></div>
    <div class="arm right"></div>
  </div>

  <div class="legs">
    <div class="leg left"></div>
    <div class="leg right"></div>
  </div>

</div>

<!-- Buttons -->
<div style="position:absolute; bottom:20px; left:20px; display:grid; gap:10px;">
  <button ontouchstart="keys.left=true" ontouchend="keys.left=false">⬅️</button>
  <button ontouchstart="keys.right=true" ontouchend="keys.right=false">➡️</button>
  <button ontouchstart="keys.up=true" ontouchend="keys.up=false">⬆️</button>
  <button ontouchstart="keys.down=true" ontouchend="keys.down=false">⬇️</button>
</div>

<div style="position:absolute; bottom:20px; right:20px;">
  <button ontouchstart="attack()">👊 Attack</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
const character = document.querySelector(".character");

let x = 0;
let y = 0;

let keys = { left:false, right:false, up:false, down:false };

// Movement loop
function animate(){
  requestAnimationFrame(animate);

  if(keys.left) x -= 3;
  if(keys.right) x += 3;
  if(keys.up) y -= 3;
  if(keys.down) y += 3;

  character.style.transform = `translate(${x}px, ${y}px)`;
}

animate();
</script>
</body>
</html>
