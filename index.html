<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ninja Game</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Controls -->
<div class="controls">

  <div class="dpad">
    <div></div>
    <button class="btn" ontouchstart="keys.up=true" ontouchend="keys.up=false">⬆️</button>
    <div></div>

    <button class="btn" ontouchstart="keys.left=true" ontouchend="keys.left=false">⬅️</button>
    <div></div>
    <button class="btn" ontouchstart="keys.right=true" ontouchend="keys.right=false">➡️</button>

    <div></div>
    <button class="btn" ontouchstart="keys.down=true" ontouchend="keys.down=false">⬇️</button>
    <div></div>
  </div>

  <button class="btn attack" ontouchstart="attack()">👊</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="script.js"></script>

</body>
</html>
